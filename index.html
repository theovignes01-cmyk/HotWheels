<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniScale — Collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ff:'DM Sans',sans-serif;--ff-d:'DM Serif Display',serif;
  --black:#18181b;--white:#fff;--bg:#fafaf8;--sur:#f4f3f0;--sur2:#eceae6;
  --bdr:#e2e0db;--bdr2:#d0cec8;--mut:#9b9890;--txt:#2c2b28;
  --red:#c9382a;--red-s:#fdf1ef;--grn:#1f7a4a;--grn-s:#eef6f1;--blu:#2a4db5;--blu-s:#eef2fc;
  --r-s:8px;--r-m:12px;--r-l:18px;--r-x:24px;
  --sh-s:0 2px 8px rgba(0,0,0,.07);--sh-m:0 6px 24px rgba(0,0,0,.10);--sh-l:0 16px 48px rgba(0,0,0,.13);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--ff);font-size:14px;line-height:1.5}
input,select,button,textarea{font-family:var(--ff)}
input[type=number]::-webkit-inner-spin-button{opacity:.4}

.topbar{height:60px;background:var(--white);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--ff-d);font-size:22px;letter-spacing:-.3px}
.logo span{color:var(--red)}
.stats-row{display:flex;gap:6px}
.stat-chip{background:var(--sur);border:1px solid var(--bdr);border-radius:40px;padding:5px 14px;display:flex;flex-direction:column;align-items:center;line-height:1.2}
.stat-chip strong{font-size:15px;font-weight:600;color:var(--black)}
.stat-chip small{font-size:9px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--mut)}

.filters-bar{background:var(--white);border-bottom:1px solid var(--bdr);padding:10px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:60px;z-index:90}

.dd-wrap{position:relative}
.dd-btn{display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--bdr2);border-radius:40px;padding:7px 16px;font-size:13px;font-weight:500;color:var(--txt);cursor:pointer;transition:border-color .15s;white-space:nowrap;user-select:none}
.dd-btn:hover{border-color:var(--black)}
.dd-btn.active{background:var(--black);color:#fff;border-color:var(--black)}
.dd-btn.active .dd-arrow{color:rgba(255,255,255,.5)}
.dd-arrow{font-size:11px;color:var(--mut);transition:transform .2s}
.dd-btn.open .dd-arrow{transform:rotate(180deg)}
.dd-panel{display:none;position:absolute;top:calc(100% + 8px);left:0;background:var(--white);border:1.5px solid var(--bdr);border-radius:var(--r-x);padding:10px;min-width:280px;max-height:500px;overflow-y:auto;z-index:300;box-shadow:var(--sh-l);animation:fadeUp .15s ease}
.dd-panel.open{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.dp-section{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);padding:8px 10px 4px}
.dp-sep{height:1px;background:var(--bdr);margin:6px 0}
.dp-row{display:flex;align-items:center;padding:7px 10px;border-radius:var(--r-m);cursor:pointer;transition:background .12s;gap:8px;user-select:none}
.dp-row:hover{background:var(--sur)}
.dp-row.sel{background:var(--black);color:#fff}
.dp-row.sel .dp-count,.dp-row.sel .dp-chv{color:rgba(255,255,255,.5)}
.dp-icon{width:28px;height:28px;border-radius:var(--r-s);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--sur)}
.dp-row.sel .dp-icon{background:rgba(255,255,255,.12)}
.dp-lbl{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-count{font-size:11px;font-weight:600;color:var(--mut);background:var(--sur);padding:2px 8px;border-radius:20px;flex-shrink:0}
.dp-row.sel .dp-count{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.dp-chv{font-size:10px;color:var(--mut);transition:transform .2s;flex-shrink:0}
.dp-chv.open{transform:rotate(90deg)}
.dp-children{display:none;padding-left:10px}
.dp-children.open{display:block}
.dp-row.l1{padding:6px 10px}
.dp-row.l1 .dp-icon{width:24px;height:24px;font-size:12px}
.dp-row.l1 .dp-lbl{font-size:12px}
.dp-row.l2{padding:5px 10px 5px 20px}
.dp-row.l2 .dp-icon{width:20px;height:20px;font-size:10px}
.dp-row.l2 .dp-lbl{font-size:12px;color:var(--mut)}
.dp-row.l2:hover .dp-lbl,.dp-row.l2.sel .dp-lbl{color:inherit}
.dp-manage{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-m);cursor:pointer;font-size:12px;font-weight:600;color:var(--mut);transition:background .12s;user-select:none}
.dp-manage:hover{background:var(--sur);color:var(--txt)}

.f-chip{display:flex;align-items:center;gap:6px;background:var(--sur);border:1.5px solid var(--bdr);border-radius:40px;padding:6px 14px}
.f-chip label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);cursor:default;white-space:nowrap}
.f-chip input[type=number]{border:none;background:transparent;font-size:12px;font-weight:500;color:var(--txt);outline:none;width:68px;padding:0}
.f-chip select{border:none;background:transparent;font-size:12px;font-weight:500;color:var(--txt);outline:none;padding:0;cursor:pointer}
.active-pill{display:none;align-items:center;gap:7px;background:var(--black);color:#fff;border-radius:40px;padding:6px 10px 6px 14px;font-size:12px;font-weight:500}
.active-pill .xb{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;transition:background .15s}
.active-pill .xb:hover{background:rgba(255,255,255,.35)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:280px}
.search-wrap input{width:100%;border:1.5px solid var(--bdr);border-radius:40px;padding:7px 14px 7px 34px;font-size:13px;font-weight:400;background:var(--sur);color:var(--txt);outline:none;transition:border-color .15s,background .15s}
.search-wrap input:focus{border-color:var(--black);background:var(--white)}
.search-wrap input::placeholder{color:var(--mut)}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none}
.btn-add{margin-left:auto;background:var(--red);color:#fff;border:none;border-radius:40px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-add:hover{opacity:.88}

.result-bar{padding:8px 28px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--mut);font-weight:500;border-bottom:1px solid var(--bdr);background:var(--bg)}
.view-toggle{display:flex;gap:4px}
.vt-btn{width:30px;height:30px;border-radius:var(--r-s);border:1.5px solid var(--bdr);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--mut)}
.vt-btn:hover{border-color:var(--black);color:var(--black)}
.vt-btn.active{background:var(--black);border-color:var(--black);color:#fff}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;padding:24px 28px}
.car-card{background:var(--white);border:1.5px solid var(--bdr);border-radius:var(--r-x);overflow:hidden;cursor:grab;transition:transform .18s,box-shadow .18s,opacity .15s,border-color .15s;position:relative;user-select:none}
.car-card:active{cursor:grabbing}
.car-card:hover{transform:translateY(-3px);box-shadow:var(--sh-m)}
.car-card.dragging{opacity:.3;transform:scale(.96);box-shadow:none !important;border-style:dashed}
.car-card.drag-over-card{border-color:var(--black);border-style:dashed;transform:translateY(-4px);box-shadow:var(--sh-m)}
.drag-handle{position:absolute;top:7px;left:7px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;cursor:grab;z-index:3;opacity:0;transition:opacity .15s;pointer-events:none}
.car-card:hover .drag-handle{opacity:1}
.drag-hint{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.38);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 7px;border-radius:20px;opacity:0;transition:opacity .15s;pointer-events:none;text-transform:uppercase}
.car-card:hover .drag-hint{opacity:1}
.card-img-wrap{width:100%;height:200px;overflow:hidden;background:var(--sur)}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;display:block;padding:6px}
.card-ph{width:100%;height:200px;background:var(--sur);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mut)}
.card-ph .phi{font-size:32px;line-height:1}
.card-ph span{font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.card-body{padding:12px 14px 8px}
.card-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--black);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--mut);margin-bottom:10px}
.card-row{display:flex;align-items:center;justify-content:space-between}
.brand-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.card-footer{padding:8px 14px 12px;display:flex;align-items:center;gap:8px}
.color-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--bdr2);flex-shrink:0}
.color-name{font-size:11px;font-weight:500;color:var(--mut);flex:1}
.yr-tag{font-size:11px;font-weight:600;color:var(--mut)}
.price-tag{font-size:11px;font-weight:600;color:var(--txt);margin-left:auto}
.qty-ball{width:26px;height:26px;border-radius:50%;background:var(--sur);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--txt)}
.qty-ball.many{background:var(--black);border-color:var(--black);color:#fff}

#view-list{padding:0 28px 24px}
.tbl-head{display:grid;grid-template-columns:52px 2fr 130px 130px 72px 80px 54px;padding:8px 0;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut);border-bottom:1.5px solid var(--bdr);margin-top:20px}
.tbl-head div,.tbl-row>div{padding:0 6px}
.tbl-row{display:grid;grid-template-columns:52px 2fr 130px 130px 72px 80px 54px;padding:10px 0;border-bottom:1px solid var(--bdr);align-items:center;cursor:pointer;border-radius:var(--r-m);transition:background .12s}
.tbl-row:hover{background:var(--sur)}
.row-thumb{width:44px;height:36px;border-radius:var(--r-s);overflow:hidden;background:var(--sur);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.row-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.row-name{font-size:13px;font-weight:600;color:var(--black)}
.row-sub{font-size:11px;color:var(--mut);margin-top:1px}
.color-cell{display:flex;align-items:center;gap:7px}

.summary-bar{position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--bdr);padding:10px 28px;display:flex;gap:24px;font-size:12px;color:var(--mut);font-weight:500}
.summary-bar strong{color:var(--black);font-weight:600;font-size:13px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-x);width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-l)}
.modal-header{padding:20px 24px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--white);border-radius:var(--r-x) var(--r-x) 0 0;z-index:2}
.modal-title{font-family:var(--ff-d);font-size:20px;color:var(--black)}
.modal-x{width:32px;height:32px;border-radius:50%;background:var(--sur);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:background .15s}
.modal-x:hover{background:var(--sur2);color:var(--txt)}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--white);border-radius:0 0 var(--r-x) var(--r-x);z-index:2}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mut)}
.field input,.field select{border:1.5px solid var(--bdr);border-radius:var(--r-m);padding:9px 13px;font-size:13px;font-weight:400;color:var(--txt);background:var(--white);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--black)}
.field input::placeholder{color:var(--mut)}
.btn-cancel{background:var(--sur);color:var(--txt);border:none;border-radius:40px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-cancel:hover{background:var(--sur2)}
.btn-save{background:var(--black);color:#fff;border:none;border-radius:40px;padding:9px 24px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.select-row{display:flex;gap:6px;align-items:center}
.select-row select{flex:1;min-width:0}
.btn-new-cat{width:32px;height:41px;flex-shrink:0;border:1.5px solid var(--bdr2);border-radius:var(--r-m);background:var(--sur);color:var(--txt);font-size:17px;font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;line-height:1}
.btn-new-cat:hover{border-color:var(--black);background:var(--sur2)}

.slots-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.photo-slot{aspect-ratio:4/3;border-radius:var(--r-m);overflow:hidden;background:var(--sur);border:2px dashed var(--bdr2);position:relative;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;justify-content:center}
.photo-slot:hover,.photo-slot.drag-over{border-color:var(--black);background:var(--sur2)}
.photo-slot.filled{border-style:solid;border-color:var(--bdr)}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.photo-slot.drag-over *{pointer-events:none}
.slot-hint{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--mut);pointer-events:none}
.slot-hint span{font-size:20px}
.slot-hint small{font-size:10px;font-weight:600}
.slot-num{position:absolute;top:5px;left:5px;width:17px;height:17px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none}
.slot-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.slot-del:hover{background:var(--red)}

.detail-main-img{width:100%;height:200px;object-fit:cover;display:block;border-radius:var(--r-x) var(--r-x) 0 0}
.detail-main-ph{width:100%;height:160px;background:var(--sur);display:flex;align-items:center;justify-content:center;font-size:52px;border-radius:var(--r-x) var(--r-x) 0 0}
.detail-thumbs{display:flex;gap:6px;padding:8px 16px 0}
.d-thumb{width:52px;height:40px;border-radius:var(--r-s);object-fit:cover;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.d-thumb.on{border-color:var(--black)}
.detail-actions{display:flex;gap:8px;padding:12px 24px 0;justify-content:flex-end}
.btn-edit{background:var(--sur);color:var(--txt);border:1.5px solid var(--bdr2);border-radius:40px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s,background .15s}
.btn-edit:hover{border-color:var(--black);background:var(--sur2)}
.btn-del{background:transparent;color:var(--red);border:1.5px solid var(--red-s);border-radius:40px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-del:hover{background:var(--red-s)}
.detail-body{padding:16px 24px 20px}
.detail-name{font-family:var(--ff-d);font-size:22px;margin-bottom:4px}
.detail-series{font-size:13px;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.dg-item label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:2px}
.dg-item span{font-size:14px;font-weight:500;color:var(--black)}
.detail-notes{margin-top:12px;padding:12px;background:var(--sur);border-radius:var(--r-m);font-size:12px;color:var(--mut)}

/* Category manager */
.cat-manager{width:600px;max-width:100%}
.cat-tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 24px}
.cat-tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.cat-tab.on{color:var(--black);border-bottom-color:var(--black)}
.cat-tab-panel{display:none;padding:16px 24px}
.cat-tab-panel.on{display:block}
.cat-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;margin-bottom:14px}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-m);background:var(--sur);border:1px solid var(--bdr)}
.cat-row-icon{font-size:16px;flex-shrink:0}
.cat-row-name{flex:1;font-size:13px;font-weight:500}
.cat-row-sub{font-size:11px;color:var(--mut);white-space:nowrap}
.cat-row-del{width:24px;height:24px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--mut);transition:background .15s,color .15s;flex-shrink:0}
.cat-row-del:hover{background:var(--red-s);color:var(--red)}
.add-form{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--bdr)}
.add-form .field{flex:1;min-width:100px}
.add-form .field.icon-f{max-width:76px}
.btn-add-cat{background:var(--black);color:#fff;border:none;border-radius:var(--r-m);padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;height:40px;align-self:flex-end;transition:opacity .15s}
.btn-add-cat:hover{opacity:.85}
.empty-list{text-align:center;padding:20px;color:var(--mut);font-size:13px}

.loose-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:10px 14px;border-radius:var(--r-m);border:1.5px solid var(--bdr);background:var(--sur);transition:border-color .15s}
.loose-toggle:hover{border-color:var(--bdr2)}
.loose-toggle input[type=checkbox]{display:none}
.loose-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--bdr2);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.loose-toggle input:checked ~ .loose-box{background:var(--black);border-color:var(--black)}
.loose-toggle input:checked ~ .loose-box::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.loose-lbl{font-size:13px;font-weight:600;color:var(--txt)}
.loose-sub{font-size:11px;font-weight:400;color:var(--mut)}
.badge-loose{display:inline-flex;align-items:center;gap:3px;background:#f5f0e8;color:#7a5c1e;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.3px}

/* crop */
.crop-ratio-btn{border:1.5px solid var(--bdr2);background:var(--sur);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;color:var(--mut);transition:all .15s}
.crop-ratio-btn:hover{border-color:var(--black);color:var(--black)}
.crop-ratio-btn.on{background:var(--black);border-color:var(--black);color:#fff}
.slot-crop{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:none;cursor:pointer;opacity:0;transition:opacity .15s;white-space:nowrap;pointer-events:auto}
.photo-slot:hover .slot-crop{opacity:1}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:10px}

/* ── MOBILE ── */
@media(max-width:640px){
  /* topbar */
  .topbar{padding:0 16px;height:52px}
  .logo{font-size:19px}
  .stat-chip{padding:4px 10px}
  .stat-chip strong{font-size:13px}
  .stat-chip small{display:none}
  .stats-row{gap:4px}

  /* filters bar */
  .filters-bar{padding:8px 12px;top:52px;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .filters-bar::-webkit-scrollbar{display:none}
  .f-chip{flex-shrink:0}
  .search-wrap{min-width:130px;max-width:180px;flex-shrink:0}
  .btn-add{display:none} /* replaced by FAB */
  .active-pill{flex-shrink:0}

  /* result bar */
  .result-bar{padding:6px 12px;font-size:11px}

  /* grid */
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:12px;padding-bottom:80px}
  /* slot crop btn always visible on touch */
  .slot-crop{opacity:1;font-size:9px;padding:2px 6px}

  /* list */
  #view-list{padding:0 12px 80px}
  .tbl-head{display:none}
  .tbl-row{grid-template-columns:44px 1fr auto;gap:0;padding:10px 8px;border-radius:var(--r-m);border:1px solid var(--bdr);margin-bottom:6px;background:var(--white)}
  .tbl-row>div:nth-child(3),.tbl-row>div:nth-child(4),.tbl-row>div:nth-child(5),.tbl-row>div:nth-child(6){display:none}
  .tbl-row>div:nth-child(7){display:flex;align-items:center;justify-content:center}

  /* summary bar */
  .summary-bar{padding:8px 12px;gap:12px;font-size:11px;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
  .summary-bar span:last-child{display:none}

  /* modals */
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{width:100% !important;max-width:100% !important;border-radius:var(--r-x) var(--r-x) 0 0;max-height:92vh;padding-bottom:env(safe-area-inset-bottom)}
  .modal-header{border-radius:var(--r-x) var(--r-x) 0 0}
  .form-row{grid-template-columns:1fr}
  .slots-grid{grid-template-columns:1fr 1fr 1fr}

  /* cat manager */
  .cat-manager{width:100% !important}

  /* FAB add button */
  .fab-add{display:flex}

  /* detail image */
  .detail-main-img{height:220px}

  /* crop modal */
  #crop-wrap{max-width:100%}
  #crop-wrap img{max-width:100%!important;width:100%!important}
}

@media(min-width:641px){
  .fab-add{display:none}
}

/* FAB */
.fab-add{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(201,56,42,.4);z-index:200;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.fab-add:active{transform:scale(.93)}
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────
let makers = [
  {id:'hw',  name:'Hot Wheels', icon:'🔥'},
  {id:'maj', name:'Majorette',  icon:'🌟'},
  {id:'mbx', name:'Matchbox',   icon:'📦'},
];
let carBrands = [
  {id:'ferrari',     name:'Ferrari',     icon:'🏎️'},
  {id:'porsche',     name:'Porsche',     icon:'🏁'},
  {id:'toyota',      name:'Toyota',      icon:'🇯🇵'},
  {id:'ford',        name:'Ford',        icon:'🇺🇸'},
  {id:'chevrolet',   name:'Chevrolet',   icon:'⭐'},
  {id:'nissan',      name:'Nissan',      icon:'🌸'},
  {id:'lamborghini', name:'Lamborghini', icon:'🐂'},
  {id:'vw',          name:'Volkswagen',  icon:'🇩🇪'},
  {id:'bmw',         name:'BMW',         icon:'⚙️'},
  {id:'renault',     name:'Renault',     icon:'🇫🇷'},
  {id:'peugeot',     name:'Peugeot',     icon:'🦁'},
  {id:'citroen',     name:'Citroën',     icon:'🔷'},
];
let seriesList = [
  {id:'s-cc',   makerId:'hw',  name:'Car Culture'},
  {id:'s-mm',   makerId:'hw',  name:'Muscle Mania'},
  {id:'s-jdm',  makerId:'hw',  name:'JDM Legends'},
  {id:'s-th',   makerId:'hw',  name:'Treasure Hunt'},
  {id:'s-pr',   makerId:'hw',  name:'Séries Premium'},
  {id:'s-vf',   makerId:'maj', name:'Vintage France'},
  {id:'s-ret',  makerId:'maj', name:'Rétros'},
  {id:'s-spd',  makerId:'maj', name:'Speed Series'},
  {id:'s-eu',   makerId:'mbx', name:'European Series'},
];
let cars = [
  {id:1, name:'Ferrari F40 Competizione',  makerId:'hw',  brandId:'ferrari',     seriesId:'s-cc',  color:'Noir',     hex:'#1a1a1a', yrc:2026,yrm:2025,scale:'1/64',qty:2,price:2.50,notes:'',img:null,img2:null,img3:null},
  {id:2, name:'Porsche 911 GT3 RS',        makerId:'hw',  brandId:'porsche',     seriesId:'s-cc',  color:'Orange',   hex:'#e05010', yrc:2025,yrm:2023,scale:'1/64',qty:1,price:1.80,notes:'Boite collector',img:null,img2:null,img3:null},
  {id:3, name:'Toyota Supra MK4',          makerId:'hw',  brandId:'toyota',      seriesId:'s-jdm', color:'Bleu',     hex:'#2255bb', yrc:2024,yrm:2022,scale:'1/64',qty:3,price:1.20,notes:'',img:null,img2:null,img3:null},
  {id:4, name:'Renault 5 Turbo',           makerId:'maj', brandId:'renault',     seriesId:'s-vf',  color:'Jaune',    hex:'#e8c020', yrc:2023,yrm:1980,scale:'1/43',qty:1,price:8.00,notes:'Édition limitée',img:null,img2:null,img3:null},
  {id:5, name:'Ford Mustang Shelby GT500', makerId:'hw',  brandId:'ford',        seriesId:'s-mm',  color:'Blanc',    hex:'#f0f0ee', yrc:2026,yrm:2024,scale:'1/64',qty:1,price:1.80,notes:'',img:null,img2:null,img3:null},
  {id:6, name:'Lamborghini Huracán',       makerId:'maj', brandId:'lamborghini', seriesId:'s-spd', color:'Vert',     hex:'#22aa44', yrc:2024,yrm:2021,scale:'1/64',qty:2,price:2.00,notes:'',img:null,img2:null,img3:null},
  {id:7, name:'Volkswagen Golf GTI Mk8',   makerId:'mbx', brandId:'vw',          seriesId:'s-eu',  color:'Rouge',    hex:'#cc2222', yrc:2022,yrm:2021,scale:'1/64',qty:1,price:1.50,notes:'',img:null,img2:null,img3:null},
  {id:8, name:'Nissan Skyline GT-R R34',   makerId:'hw',  brandId:'nissan',      seriesId:'s-jdm', color:'Argent',   hex:'#c0c0c0', yrc:2025,yrm:2001,scale:'1/64',qty:4,price:2.20,notes:'Treasure Hunt',img:null,img2:null,img3:null},
  {id:9, name:'Citroën DS 21',             makerId:'maj', brandId:'citroen',     seriesId:'s-ret', color:'Crème',    hex:'#f0e8c0', yrc:2021,yrm:1965,scale:'1/43',qty:1,price:12.00,notes:"Boite d'origine",img:null,img2:null,img3:null},
  {id:10,name:'Chevrolet Camaro Z28',      makerId:'hw',  brandId:'chevrolet',   seriesId:'s-mm',  color:'Bleu nuit',hex:'#1a2555', yrc:2023,yrm:1969,scale:'1/64',qty:2,price:1.80,notes:'',img:null,img2:null,img3:null},
  {id:11,name:'BMW M3 E46',                makerId:'hw',  brandId:'bmw',         seriesId:'s-pr',  color:'Gris',     hex:'#888888', yrc:2024,yrm:2003,scale:'1/64',qty:1,price:2.00,notes:'',img:null,img2:null,img3:null},
  {id:12,name:'Peugeot 205 GTI',           makerId:'maj', brandId:'peugeot',     seriesId:'s-vf',  color:'Blanc',    hex:'#f5f5f5', yrc:2022,yrm:1984,scale:'1/43',qty:2,price:9.00,notes:'',img:null,img2:null,img3:null},
  {id:13,name:'Ferrari 488 GTB',           makerId:'maj', brandId:'ferrari',     seriesId:'s-spd', color:'Rouge',    hex:'#cc2222', yrc:2023,yrm:2020,scale:'1/43',qty:1,price:5.00,notes:'',img:null,img2:null,img3:null},
];
let nextId = 20;

// ── HELPERS ────────────────────────────────────
const getMaker  = id => makers.find(m=>m.id===id)     || {name:id,icon:'🚗'};
const getBrand  = id => carBrands.find(b=>b.id===id)  || {name:id,icon:'🚗'};
const getSeries = id => seriesList.find(s=>s.id===id) || {name:id};

function brandPill(makerId) {
  const m = getMaker(makerId);
  const pal = {hw:'background:#fff0ee;color:#c0200a', maj:'background:#eef6f1;color:#1f7a4a', mbx:'background:#eef2fc;color:#2a4db5'};
  const s = pal[makerId]||'background:var(--sur);color:var(--mut)';
  return `<span class="brand-pill" style="${s}">${m.icon} ${m.name}</span>`;
}

function slugify(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

// ── FILTER STATE ────────────────────────────────
let filt = {type:'all'};
function matchFilt(c) {
  if (filt.type==='all')         return true;
  if (filt.type==='maker')       return c.makerId===filt.makerId;
  if (filt.type==='brand')       return c.brandId===filt.brandId;
  if (filt.type==='mkbr')        return c.makerId===filt.makerId && c.brandId===filt.brandId;
  if (filt.type==='series')      return c.seriesId===filt.seriesId;
  if (filt.type==='scale')       return c.scale===filt.scale;
  return true;
}

// ── DROPDOWN TREE ──────────────────────────────
function renderTree() {
  let h = '';
  h += row('all',{type:'all'},'🚗','Toute la collection',cars.length,false,0);
  h += `<div class="dp-sep"></div><div class="dp-section">Fabricants</div>`;
  makers.forEach(mk => {
    const mkN = cars.filter(c=>c.makerId===mk.id).length;
    h += `<div class="dp-row${filt.type==='maker'&&filt.makerId===mk.id?' sel':''}" onclick="toggle('tm-${mk.id}',event)">
      <div class="dp-icon">${mk.icon}</div><span class="dp-lbl">${mk.name}</span>
      <span class="dp-count">${mkN}</span><span class="dp-chv" id="chv-tm-${mk.id}">›</span>
    </div>
    <div class="dp-children" id="tm-${mk.id}">`;
    // "Tout fabricant"
    h += row('mk-'+mk.id,{type:'maker',makerId:mk.id},mk.icon,'Tout '+mk.name,mkN,true,1);

      h += row('mkbr-'+mk.id+'-'+bId,{type:'mkbr',makerId:mk.id,brandId:bId},br.icon,'Toutes '+br.name,brN,true,2);
      [...new Set(cars.filter(c=>c.makerId===mk.id&&c.brandId===bId).map(c=>c.seriesId))].forEach(sId=>{

    h+=row('sc-'+sc,{type:'scale',scale:sc},'📐',sc,cars.filter(c=>c.scale===sc).length,false,0);

function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const yrc=parseInt(document.getElementById('yr-color').value)||null;
  const yrm=parseInt(document.getElementById('yr-model').value)||null;
  const srt=document.getElementById('sort').value;
  let f=cars.filter(c=>{
    const mc=matchFilt(c);
    const ms=!q||[c.name,getMaker(c.makerId).name,getBrand(c.brandId).name,getSeries(c.seriesId).name].some(x=>x.toLowerCase().includes(q));
    return mc&&ms&&(!yrc||c.yrc===yrc)&&(!yrm||c.yrm===yrm);
  });
  f.sort((a,b)=>{
    if(srt==='name')  return a.name.localeCompare(b.name);
    if(srt==='year')  return b.yrc-a.yrc;
    if(srt==='price') return b.price-a.price;
    if(srt==='qty')   return b.qty-a.qty;
    return 0;
  });
  return f;
}

// ── PHOTO SLOTS ────────────────────────────────
// Slot context stored by slotKey so inline handlers can reach closures
const _slotCtx = {};

function buildSlots(photos, key, onUpdate) {
  _slotCtx[key] = { photos, onUpdate };
  return [0,1,2].map(i => {
    const hasImg = !!photos[i];
    return `
    <div class="photo-slot${hasImg?' filled':''}" id="slot-${key}-${i}"
      ondragenter="event.preventDefault();event.stopPropagation();document.getElementById('slot-${key}-${i}').classList.add('drag-over')"
      ondragover="event.preventDefault();event.stopPropagation()"
      ondragleave="event.stopPropagation();document.getElementById('slot-${key}-${i}').classList.remove('drag-over')"
      ondrop="slotDrop(event,'${key}',${i})">
      <span class="slot-num">${i+1}</span>
      <input type="file" accept="image/*" style="pointer-events:${hasImg?'none':'auto'}" onchange="slotFile(this,'${key}',${i})">
      ${hasImg
        ? `<img src="${photos[i]}" alt="" style="pointer-events:none">
           <button class="slot-del" onclick="slotDel(event,'${key}',${i})">✕</button>
           <button class="slot-crop" onclick="openCrop(event,'${key}',${i})">✂️ Rogner</button>`
        : `<div class="slot-hint" style="pointer-events:none"><span>📷</span><small>Photo ${i+1}</small></div>`
      }
    </div>`;
  }).join('');
}

function slotFile(input, key, i) {
  if (!input.files || !input.files[0]) return;
  const r = new FileReader();
  r.onload = e => slotSet(key, i, e.target.result);
  r.readAsDataURL(input.files[0]);
}

function slotDel(e, key, i) {
  e.stopPropagation(); e.preventDefault();
  slotSet(key, i, null);
}

function slotDrop(e, key, i) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('slot-'+key+'-'+i).classList.remove('drag-over');

  const dt = e.dataTransfer;

  // 1. File from Finder / Downloads
  const file = dt.files[0];
  if (file && file.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = ev => slotSet(key, i, ev.target.result);
    r.readAsDataURL(file);
    return;
  }

  // 2. Image element dragged from browser → get src from HTML
  const html = dt.getData('text/html') || '';
  const srcMatch = html.match(/src=["']([^"']+)["']/i);
  if (srcMatch && srcMatch[1]) {
    const src = srcMatch[1];
    // absolute URL
    if (/^https?:\/\//i.test(src)) { slotFetchUrl(src, key, i); return; }
    // data URL
    if (/^data:image\//i.test(src)) { slotSet(key, i, src); return; }
  }

  // 3. Plain URL (text/uri-list or text/plain)
  const url = (dt.getData('text/uri-list') || dt.getData('text/plain') || '').trim().split('\n')[0];
  if (/^https?:\/\//i.test(url)) {
    slotFetchUrl(url, key, i);
    return;
  }
}

function slotFetchUrl(url, key, i) {
  const slot = document.getElementById('slot-'+key+'-'+i);
  if (slot) { slot.style.opacity = '0.5'; }

  fetch(url, {mode:'cors'})
    .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.blob(); })
    .then(blob => {
      if (!blob.type.startsWith('image/')) throw new Error('not an image');
      const r = new FileReader();
      r.onload = e => { slotSet(key, i, e.target.result); if(slot) slot.style.opacity=''; };
      r.readAsDataURL(blob);
    })
    .catch(() => {
      // CORS blocked — store the remote URL directly as src (works as long as page is open)
      slotSet(key, i, url);
      if (slot) slot.style.opacity = '';
    });
}

function slotSet(key, i, value) {
  const ctx = _slotCtx[key];
  if (!ctx) return;
  ctx.photos[i] = value;
  ctx.onUpdate();
}

  document.querySelectorAll('.cat-tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  document.querySelectorAll('.cat-tab-panel').forEach((p,j)=>p.classList.toggle('on',j===i));

function renderCatLists(){
  document.getElementById('cl-makers').innerHTML=makers.length
    ?makers.map(m=>`<div class="cat-row">
        <span class="cat-row-icon">${m.icon}</span>
        <span class="cat-row-name">${m.name}</span>
        <span class="cat-row-sub">${cars.filter(c=>c.makerId===m.id).length} modèles</span>
        <button class="cat-row-del" onclick="delMaker('${m.id}')">🗑</button>
      </div>`).join('')
    :`<div class="empty-list">Aucun fabricant</div>`;

  document.getElementById('cl-brands').innerHTML=carBrands.length
    ?carBrands.map(b=>`<div class="cat-row">
        <span class="cat-row-icon">${b.icon}</span>
        <span class="cat-row-name">${b.name}</span>
        <span class="cat-row-sub">${cars.filter(c=>c.brandId===b.id).length} modèles</span>
        <button class="cat-row-del" onclick="delBrand('${b.id}')">🗑</button>
      </div>`).join('')
    :`<div class="empty-list">Aucune marque automobile</div>`;

  document.getElementById('cl-series').innerHTML=seriesList.length
    ?seriesList.map(s=>{
        const mk=getMaker(s.makerId);
        return `<div class="cat-row">
          <span class="cat-row-icon">${mk.icon}</span>
          <span class="cat-row-name">${s.name}</span>
          <span class="cat-row-sub">${mk.name} · ${cars.filter(c=>c.seriesId===s.id).length} modèles</span>
          <button class="cat-row-del" onclick="delSeries('${s.id}')">🗑</button>
        </div>`;}).join('')
    :`<div class="empty-list">Aucune série</div>`;

  document.getElementById('ns-maker').innerHTML=makers.map(m=>`<option value="${m.id}">${m.icon} ${m.name}</option>`).join('');
}

function addMaker(){
  const icon=document.getElementById('nm-icon').value.trim()||'🚗';
  const name=document.getElementById('nm-name').value.trim();
  if(!name)return;
  const id=slugify(name);
  if(makers.find(m=>m.id===id)){alert('Ce fabricant existe déjà.');return;}
  makers.push({id,name,icon});
  document.getElementById('nm-name').value='';
  document.getElementById('nm-icon').value='';
  renderCatLists();
}

function delMaker(id){
  const n=cars.filter(c=>c.makerId===id).length;
  if(n&&!confirm(`Ce fabricant contient ${n} modèle(s). Supprimer quand même ?`))return;
  makers=makers.filter(m=>m.id!==id); renderCatLists();
}
function delBrand(id){
  const n=cars.filter(c=>c.brandId===id).length;
  if(n&&!confirm(`Cette marque contient ${n} modèle(s). Supprimer quand même ?`))return;
  carBrands=carBrands.filter(b=>b.id!==id); renderCatLists();
}
function delSeries(id){
  const n=cars.filter(c=>c.seriesId===id).length;
  if(n&&!confirm(`Cette série contient ${n} modèle(s). Supprimer quand même ?`))return;
  seriesList=seriesList.filter(s=>s.id!==id); renderCatLists();
}

// ── CARD DRAG & DROP REORDER ───────────────────
let dragSrcId = null;
let dragEndedAt = 0; // timestamp of last dragend — used to swallow the follow-up click

function dragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(id));
  setTimeout(() => {
    const el = document.querySelector(`.car-card[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function dragEnd(e) {
  dragEndedAt = Date.now();
  document.querySelectorAll('.car-card').forEach(c =>
    c.classList.remove('dragging', 'drag-over-card')
  );
  dragSrcId = null;
}

function cardDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const id = parseInt(e.currentTarget.dataset.id);
  if (id !== dragSrcId) e.currentTarget.classList.add('drag-over-card');
}

function cardDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-card');
}

function cardDrop(e, targetId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over-card');
  if (!dragSrcId || dragSrcId === targetId) return;
  const fromIdx = cars.findIndex(c => c.id === dragSrcId);
  const toIdx   = cars.findIndex(c => c.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = cars.splice(fromIdx, 1);
  cars.splice(toIdx, 0, moved);
  render();
}

// The browser fires a click after every dragend on the source element.
// We swallow it if it arrives within 200 ms of the drag finishing.
function cardClick(e, id) {
  if (Date.now() - dragEndedAt < 200) return;
  openDetail(id);
}

// ── CROP ───────────────────────────────────────
let cropKey=null, cropIdx=null, cropRatio=null;
let cropState={x:0,y:0,w:0,h:0};
let cropDrag=null; // {startX,startY,ox,oy,ow,oh,mode}

function openCrop(e, key, i) {
  e.stopPropagation(); e.preventDefault();
  const ctx = _slotCtx[key];
  if (!ctx || !ctx.photos[i]) return;
  cropKey=key; cropIdx=i; cropRatio=null;

  const img = document.getElementById('crop-img');
  img.src = ctx.photos[i];
  img.onload = () => {
    // Size the wrap to fit within 500px
    const wrap = document.getElementById('crop-wrap');
    const maxW = 500;
    const scale = img.naturalWidth > maxW ? maxW/img.naturalWidth : 1;
    const dW = Math.round(img.naturalWidth * scale);
    const dH = Math.round(img.naturalHeight * scale);
    wrap.style.width = dW+'px';
    wrap.style.height = dH+'px';
    img.style.width = dW+'px';
    img.style.height = dH+'px';
    // default: full image selected
    cropState = {x:0, y:0, w:dW, h:dH};
    updateCropBox();
  };

  document.getElementById('modal-crop').classList.add('open');
  // Reset ratio buttons
  document.querySelectorAll('.crop-ratio-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.crop-ratio-btn').classList.add('on');
}

function closeCrop() {
  document.getElementById('modal-crop').classList.remove('open');
  cropKey=null; cropIdx=null;
}

function setCropRatio(r, btn) {
  cropRatio = r;
  document.querySelectorAll('.crop-ratio-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if (r !== null) {
    const wrap = document.getElementById('crop-wrap');
    const wW = wrap.offsetWidth, wH = wrap.offsetHeight;
    let cW = cropState.w, cH = cW/r;
    if (cH > wH) { cH = wH; cW = cH*r; }
    cropState.w = Math.round(cW);
    cropState.h = Math.round(cH);
    cropState.x = Math.round((wW-cW)/2);
    cropState.y = Math.round((wH-cH)/2);
    updateCropBox();
  }
}

function updateCropBox() {
  const b = document.getElementById('crop-box');
  const {x,y,w,h} = cropState;
  b.style.left=x+'px'; b.style.top=y+'px';
  b.style.width=w+'px'; b.style.height=h+'px';
}

// Drag interaction on crop-wrap
const cropWrap = document.getElementById('crop-wrap');

cropWrap.addEventListener('mousedown', e => {
  e.preventDefault();
  const box = document.getElementById('crop-box');
  const br = box.getBoundingClientRect();
  const wr = cropWrap.getBoundingClientRect();
  const mx = e.clientX - wr.left, my = e.clientY - wr.top;
  // edge threshold px
  const T=10;
  const onL=Math.abs(mx-cropState.x)<T, onR=Math.abs(mx-(cropState.x+cropState.w))<T;
  const onT=Math.abs(my-cropState.y)<T, onB=Math.abs(my-(cropState.y+cropState.h))<T;
  const inside = mx>=cropState.x && mx<=cropState.x+cropState.w && my>=cropState.y && my<=cropState.y+cropState.h;

  let mode='new';
  if (onL&&onT) mode='nw'; else if (onR&&onT) mode='ne';
  else if (onL&&onB) mode='sw'; else if (onR&&onB) mode='se';
  else if (onL) mode='w'; else if (onR) mode='e';
  else if (onT) mode='n'; else if (onB) mode='s';
  else if (inside) mode='move';

  cropDrag={startX:mx,startY:my,ox:cropState.x,oy:cropState.y,ow:cropState.w,oh:cropState.h,mode};
  cropWrap.style.cursor = mode==='move'?'grabbing':mode==='new'?'crosshair':'nwse-resize';
});

document.addEventListener('mousemove', e => {
  if (!cropDrag) return;
  const wr = document.getElementById('crop-wrap').getBoundingClientRect();
  const mx = Math.max(0,Math.min(e.clientX-wr.left, wr.width));
  const my = Math.max(0,Math.min(e.clientY-wr.top, wr.height));
  const dx=mx-cropDrag.startX, dy=my-cropDrag.startY;
  const {ox,oy,ow,oh,mode}=cropDrag;
  let {x,y,w,h}=cropState;
  const wW=wr.width, wH=wr.height;

  if (mode==='new') {
    x=Math.min(cropDrag.startX,mx); y=Math.min(cropDrag.startY,my);
    w=Math.abs(mx-cropDrag.startX); h=Math.abs(my-cropDrag.startY);
    if (cropRatio) { h=w/cropRatio; if(y+h>wH){h=wH-y;w=h*cropRatio;} }
  } else if (mode==='move') {
    x=Math.max(0,Math.min(ox+dx, wW-ow));
    y=Math.max(0,Math.min(oy+dy, wH-oh));
    w=ow; h=oh;
  } else {
    // resize handles
    if (mode.includes('e')) { w=Math.max(20,Math.min(ow+dx,wW-ox)); }
    if (mode.includes('s')) { h=Math.max(20,Math.min(oh+dy,wH-oy)); }
    if (mode.includes('w')) { w=Math.max(20,ow-dx); x=Math.max(0,Math.min(ox+dx,ox+ow-20)); }
    if (mode.includes('n')) { h=Math.max(20,oh-dy); y=Math.max(0,Math.min(oy+dy,oy+oh-20)); }
    if (cropRatio) { h=w/cropRatio; }
  }
  cropState={x:Math.round(x),y:Math.round(y),w:Math.round(Math.max(10,w)),h:Math.round(Math.max(10,h))};
  updateCropBox();
});

document.addEventListener('mouseup', () => {
  if (cropDrag) { cropDrag=null; if(cropWrap) cropWrap.style.cursor='crosshair'; }
});

function applyCrop() {
  const img = document.getElementById('crop-img');
  const wrap = document.getElementById('crop-wrap');
  const scaleX = img.naturalWidth / wrap.offsetWidth;
  const scaleY = img.naturalHeight / wrap.offsetHeight;
  const {x,y,w,h} = cropState;

  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(w * scaleX);
  canvas.height = Math.round(h * scaleY);
  const ctx2 = canvas.getContext('2d');
  ctx2.drawImage(img,
    Math.round(x*scaleX), Math.round(y*scaleY),
    canvas.width, canvas.height,
    0, 0, canvas.width, canvas.height
  );
  slotSet(cropKey, cropIdx, canvas.toDataURL('image/jpeg', 0.92));
  closeCrop();
}

document.getElementById('modal-crop').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-crop')) closeCrop();
});

document.addEventListener('drop', e => e.preventDefault());
